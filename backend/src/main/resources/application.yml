# ===================================================================
# BASE CONFIGURATION (application.yml)
# ===================================================================
# This file imports environment variables and establishes common defaults.
# All sensitive values are resolved via placeholders.

spring:
  application:
    name: ${APP_NAME}

  profiles:
    # Resolves the active Spring Profile from the environment variable
    active: ${APP_ENV}

  lifecycle:
    # Graceful shutdown timeout before forcing termination
    timeout-per-shutdown-phase: 30s

  flyway:
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
    out-of-order: false
    baseline-on-migrate: false
    encoding: UTF-8

  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 1000
    scheduling:
      pool:
        size: 5

  cache:
    type: redis

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10
          max-wait: 1000ms

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:messaging}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

server:
  port: ${SERVER_PORT}
  shutdown: graceful
  servlet:
    encoding:
      # Enforce UTF-8 encoding universally
      charset: UTF-8
      enabled: true
      force: true
  error:
    # Secure default: Never expose stack traces to clients
    include-stacktrace: never

# ===================================================================
# CUSTOM CONFIGURATION PROPERTIES BINDING
# ===================================================================
# Binds YAML structure to the @ConfigurationProperties classes

app:
  name: ${APP_NAME}
  environment: ${APP_ENV}
  version: ${APP_VERSION}

jwt:
  secret: ${JWT_SECRET}
  accessTokenExpiration: ${JWT_ACCESS_EXPIRATION}
  refreshTokenExpiration: ${JWT_REFRESH_EXPIRATION}


smtp:
  host: ${SMTP_HOST}
  port: ${SMTP_PORT}
  username: ${SMTP_USERNAME}
  password: ${SMTP_PASSWORD}
  from: ${SMTP_FROM}

cors:
  allowedOrigins: ${CORS_ALLOWED_ORIGINS}
