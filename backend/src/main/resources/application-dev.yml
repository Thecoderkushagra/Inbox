# ===================================================================
# DEVELOPMENT PROFILE (application-dev.yml)
# ===================================================================
# Optimizes settings for developer productivity and local debugging.

spring:
  jpa:
    properties:
      hibernate:
        # SQL formatting enabled to make debug logs readable
        format_sql: true
        use_sql_comments: true
  
  flyway:
    # Ensure database migrations run automatically on startup
    enabled: true

server:
  shutdown: graceful
  tomcat:
    websocket:
      # Increased WebSocket message sizes for local debugging of large payloads
      max-text-message-buffer-size: 1048576 # 1MB
      max-binary-message-buffer-size: 1048576 # 1MB

logging:
  level:
    # Verbose logging to assist development
    root: INFO
    com.messaging.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG
