services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-inbox-dev
    environment:
      POSTGRES_USER: ${DB_USERNAME:-messaging_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-messaging_password}
      POSTGRES_DB: ${DB_NAME:-messaging_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-inbox-dev:/var/lib/postgresql/data
    networks:
      - internal-net-inbox-dev

  backend:
    # Build context to be uncommented when Dockerfiles are created
    # build:
    #   context: .
    #   dockerfile: docker/backend/Dockerfile.dev
    image: backend-inbox-dev
    container_name: backend-inbox-dev
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-messaging_db}
      - DB_USERNAME=${DB_USERNAME:-messaging_user}
      - DB_PASSWORD=${DB_PASSWORD:-messaging_password}
      - SPRING_PROFILES_ACTIVE=dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - internal-net-inbox-dev

  frontend:
    # build:
    #   context: .
    #   dockerfile: docker/frontend/Dockerfile.dev
    image: frontend-inbox-dev
    container_name: frontend-inbox-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - internal-net-inbox-dev

networks:
  internal-net-inbox-dev:
    name: internal-net-inbox-dev
    driver: bridge

volumes:
  postgres-data-inbox-dev:
    name: postgres-data-inbox-dev
