services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-inbox-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data-inbox-prod:/var/lib/postgresql/data
    networks:
      - internal-net-inbox-prod
    healthcheck:
      test: ["CMD-SHELL", "echo 'postgres healthcheck placeholder'"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    # build:
    #   context: .
    #   dockerfile: docker/backend/Dockerfile.prod
    image: backend-inbox-prod
    container_name: backend-inbox-prod
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - postgres
    networks:
      - internal-net-inbox-prod
    healthcheck:
      test: ["CMD-SHELL", "echo 'backend healthcheck placeholder'"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    # build:
    #   context: .
    #   dockerfile: docker/frontend/Dockerfile.prod
    image: frontend-inbox-prod
    container_name: frontend-inbox-prod
    restart: unless-stopped
    networks:
      - internal-net-inbox-prod
    healthcheck:
      test: ["CMD-SHELL", "echo 'frontend healthcheck placeholder'"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: nginx-inbox-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-config-inbox-prod:/etc/nginx/conf.d
    depends_on:
      - backend
      - frontend
    networks:
      - internal-net-inbox-prod
    healthcheck:
      test: ["CMD-SHELL", "echo 'nginx healthcheck placeholder'"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal-net-inbox-prod:
    name: internal-net-inbox-prod
    driver: bridge

volumes:
  postgres-data-inbox-prod:
    name: postgres-data-inbox-prod
  nginx-config-inbox-prod:
    name: nginx-config-inbox-prod
