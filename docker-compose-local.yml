services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-inbox-local
    environment:
      POSTGRES_USER: ${DB_USERNAME:-messaging_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-messaging_password}
      POSTGRES_DB: ${DB_NAME:-messaging_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-inbox-local:/var/lib/postgresql/data
    networks:
      - internal-net-inbox-local

  redis:
    image: redis:8.8.0
    container_name: redis-inbox-local
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_cache}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data-inbox-local:/data
    networks:
      - internal-net-inbox-local

networks:
  internal-net-inbox-local:
    name: internal-net-inbox-local
    driver: bridge

volumes:
  postgres-data-inbox-local:
    name: postgres-data-inbox-local
  redis-data-inbox-local:
    name: redis-data-inbox-local
