services:
  postgres:
    image: postgres:16-alpine
    container_name: messaging-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USERNAME:-messaging_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-messaging_password}
      POSTGRES_DB: ${DB_NAME:-messaging_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - messaging

  redis2:
    image: redis:8.8.0
    container_name: redis2
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWD}   # only used for reference, not by Redis itself
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data_db:/data


networks:
  messaging:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_db:
